spring.application.name=love-app-backend

spring.datasource.url=${DATABASE_URL}&prepareThreshold=0
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true

spring.flyway.enabled=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRINGMAIL_USERNAME}
spring.mail.password=${SPRINGMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

resend.api-key=${RESEND_API_KEY}

mercadopago.token=${TOKEN_ACESS_MP}